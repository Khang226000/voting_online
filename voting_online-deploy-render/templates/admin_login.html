<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🔐 Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: #141414; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: rgba(0,0,0,0.75); padding: 60px; border-radius: 8px; width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h1 { margin-top: 0; color: #e50914; }
        .form-group { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border-radius: 4px; border: none; background: #333; color: white; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #e50914; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        .btn-login:hover { background: #b20710; }
        .error-msg { color: #e50914; font-size: 0.9em; margin-bottom: 15px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #b3b3b3; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Đăng nhập Admin</h1>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="error-msg">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <input type="text" name="username" placeholder="Tên đăng nhập" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Mật khẩu" required>
            </div>
            <button type="submit" class="btn-login">Đăng nhập</button>
        </form>
        <a href="/" class="back-link">← Quay lại trang bầu cử</a>
    </div>
</body>
</html>
