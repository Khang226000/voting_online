<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗳️ Hệ Thống Bỏ Phiếu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <h1>🗳️ Hệ Thống Bỏ Phiếu Trực Tuyến</h1>
    <p>Công nghệ Blockchain - An toàn và Minh bạch</p>
</header>

<div class="container">
    <div class="card">
        <h2>Chọn Ứng Viên</h2>

        <!-- Grid các ứng viên -->
        <div class="candidates-grid">
            {% for c in candidates %}
                <div class="candidate-card">
                    {# Tự động xử lý đường dẫn ảnh từ folder /img #}
                    {% set img_src = c.Image if c.Image.startswith('/img/') else '/img/' + c.Image %}
                    <img src="{{ img_src }}" alt="{{ c.Name }}" class="candidate-image" onerror="loadPlaceholder(this)">
                    <div class="candidate-info">
                        <div class="candidate-name">{{ c.Name }}</div>
                        <button class="vote-button" name="candidate" value="{{c.Name}}" onclick="submitCandidate(this)">
                            ✓ Bỏ Phiếu
                        </button>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
</div>

<form id="voteForm" action="/vote" method="post" style="display: none;">
    <input type="hidden" name="candidate" id="candidateInput">
</form>

<script>
function loadPlaceholder(img) {
    img.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 300'%3E%3Crect fill='%23e0e0e0' width='300' height='300'/%3E%3Ccircle cx='150' cy='80' r='35' fill='%23999'/%3E%3Cpath d='M 100 140 Q 100 120 150 120 Q 200 120 200 140 L 200 220 L 100 220 Z' fill='%23999'/%3E%3Ctext x='150' y='260' font-size='18' text-anchor='middle' fill='%23666'%3ENo Image%3C/text%3E%3C/svg%3E";
}

function submitCandidate(button) {
    document.getElementById('candidateInput').value = button.value;
    document.getElementById('voteForm').submit();
}
</script>

</body>
</html>
